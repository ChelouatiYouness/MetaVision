<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>META VISION — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="icon" type="image/png" href="ChatGPT Image 15 mai 2026, 05_20_36.png">
  <style>
    :root {
      --red: #E50914;
      --dark: #141414;
      --gold: #F5C518;
      --bg: #0B0B0B;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--bg);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(229,9,20,0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(245,197,24,0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(229,9,20,0.07) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.3;
      z-index: 0;
    }

    .login-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 1rem;
      animation: fadeSlideUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand {
      text-align: center;
      margin-bottom: 2rem;
    }
    .brand-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3rem;
      letter-spacing: 0.15em;
      color: var(--red);
      line-height: 1;
      text-shadow: 0 0 40px rgba(229,9,20,0.5);
    }
    .brand-tagline {
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-top: 0.25rem;
    }

    .login-card {
      background: rgba(20, 20, 20, 0.85);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      backdrop-filter: blur(20px);
      box-shadow:
        0 0 0 1px rgba(229,9,20,0.08),
        0 40px 80px rgba(0,0,0,0.6),
        0 8px 24px rgba(0,0,0,0.4);
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 500;
      color: rgba(255,255,255,0.9);
      margin-bottom: 0.25rem;
    }
    .card-sub {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.35);
      margin-bottom: 2rem;
    }

    .form-label {
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-bottom: 0.4rem;
    }

    .form-control {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      padding: 0.75rem 1rem;
      transition: all 0.3s ease;
    }
    .form-control:focus {
      background: rgba(255,255,255,0.08);
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(229,9,20,0.15);
      color: #fff;
      outline: none;
    }
    .form-control::placeholder { color: rgba(255,255,255,0.2); }

    .btn-login {
      width: 100%;
      background: var(--red);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 0.8rem;
      margin-top: 0.5rem;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .btn-login::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 60%);
      pointer-events: none;
    }
    .btn-login:hover {
      background: #ff1a26;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(229,9,20,0.4);
    }
    .btn-login:active { transform: translateY(0); }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
    }
    .divider span { flex: 1; height: 1px; background: rgba(255,255,255,0.07); }
    .divider p { font-size: 0.75rem; color: rgba(255,255,255,0.25); white-space: nowrap; }

    .guest-note {
      text-align: center;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.3);
    }
    .guest-note a { color: var(--gold); text-decoration: none; transition: color 0.2s; }
    .guest-note a:hover { color: #ffd740; }

    .error-msg {
      font-size: 0.82rem;
      color: var(--red);
      margin-top: 0.5rem;
      display: none;
      animation: shake 0.4s ease;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }
    .film-strip {
      position: fixed;
      width: 2px;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 8px,
        rgba(229,9,20,0.15) 8px, rgba(229,9,20,0.15) 12px
      );
      top: 0; bottom: 0;
      pointer-events: none;
      z-index: 0;
    }
    .film-strip.left { left: 5%; }
    .film-strip.right { right: 5%; }
  </style>
</head>
<body>
  <div class="film-strip left"></div>
  <div class="film-strip right"></div>

  <div class="login-wrapper">
    <div class="brand">
      <div class="brand-name">META VISION</div>
      <div class="brand-tagline">Your Cinematic Universe</div>
    </div>

    <div class="login-card">
      <div class="card-title">Welcome back</div>
      <div class="card-sub">Sign in to continue streaming</div>

      <div class="mb-3">
        <label class="form-label" for="UserN">Username</label>
        <input type="text" class="form-control" id="UserN" placeholder="Enter your username" autocomplete="off"/>
      </div>

      <div class="mb-3">
        <label class="form-label" for="passU">Password</label>
        <input type="password" class="form-control" id="passU" placeholder="Enter your password"/>
        <div class="error-msg" id="loginError">⚠ Please fill in all fields to continue.</div>
      </div>

      <button class="btn-login" id="logbt">Sign In →</button>

      <div class="divider">
        <span></span><p>or</p><span></span>
      </div>

      <div class="guest-note">
        New here? <a href="movie_page.html">Browse as guest</a>
      </div>
    </div>
  </div>

  <script src="movie.js"></script>
</body>
</html>
